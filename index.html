<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0c0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MilCorr">
<meta name="description" content="Precision scope adjustment calculator">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<title>Mil Correction</title>
<style>
  :root {
    --bg:#0a0c0f; --bg2:#111417; --bg3:#181c21;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --accent:#c8a84b; --accent2:#8fbf6a; --danger:#e24b4a;
    --text:#e8e4dc; --text2:#8a8880; --text3:#5f5e5a;
    --mono:'Share Tech Mono',monospace; --display:'Rajdhani',sans-serif;
    --radius:10px; --radius-lg:16px;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { background:var(--bg); color:var(--text); font-family:var(--display); min-height:100vh; overscroll-behavior:none; -webkit-font-smoothing:antialiased; }
  body { padding-bottom:calc(1rem + var(--safe-bottom)); }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
  input[type=number] { -moz-appearance:textfield; }

  .app-header { background:var(--bg2); border-bottom:1px solid var(--border); padding:calc(0.7rem + var(--safe-top)) 1.1rem 0.7rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .brand { display:flex; align-items:center; gap:8px; }
  .brand .title { font-size:18px; font-weight:700; letter-spacing:0.1em; color:var(--accent); text-transform:uppercase; line-height:1; }
  .range-pill { display:flex; align-items:center; gap:2px; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:5px 10px; }
  .range-pill input { width:54px; background:transparent; border:none; outline:none; color:var(--text); font-family:var(--mono); font-size:17px; text-align:right; }
  .range-pill input::placeholder { color:var(--text3); }
  .range-pill .u { font-family:var(--mono); font-size:11px; color:var(--text2); }

  .main { padding:0.9rem 1.1rem; display:flex; flex-direction:column; gap:0.7rem; }

  .scope-wrap { display:flex; flex-direction:column; align-items:center; }
  .scope { width:132px; height:132px; display:block; }
  .impact-lbl { color:#a8a59a; font-size:10px; font-family:var(--mono); letter-spacing:0.12em; text-align:center; margin-top:2px; min-height:14px; }
  .impact-lbl .off { color:var(--danger); }

  .axis { display:flex; flex-direction:column; gap:6px; }
  .axis-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .axis-name { font-size:10px; color:var(--text2); font-family:var(--mono); letter-spacing:0.14em; }
  .axis-val { font-family:var(--mono); font-size:21px; font-weight:700; }
  .axis-val .u { font-size:11px; color:var(--text2); margin-left:2px; }
  .vw { color:var(--accent); } .ve { color:var(--accent2); }

  .seg { display:inline-flex; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; overflow:hidden; }
  .seg button { padding:9px 18px; font-family:var(--mono); font-size:13px; font-weight:400; background:transparent; border:none; color:var(--text2); letter-spacing:0.08em; text-transform:uppercase; transition:background 0.15s,color 0.15s; cursor:pointer; }
  .seg button.onw { background:rgba(200,168,75,0.15); color:var(--accent); }
  .seg button.one { background:rgba(143,191,106,0.15); color:var(--accent2); }

  .scale-screen { position:relative; background:#15181c; border:1px solid var(--border2); border-radius:7px; overflow:hidden; height:52px; touch-action:none; cursor:grab; }
  .scale-screen:active { cursor:grabbing; }
  .scale-screen canvas { display:block; width:100%; height:52px; }

  .dial-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .dial-card { background:var(--bg2); border:1px solid rgba(200,168,75,0.22); border-radius:var(--radius); padding:10px 12px; }
  .dial-card.e { border-color:rgba(143,191,106,0.22); }
  .dial-big { font-family:var(--mono); font-size:15px; font-weight:600; margin-bottom:5px; }
  .dial-line { font-family:var(--mono); font-size:11px; color:#c4c2ba; }
  .dial-line2 { font-family:var(--mono); font-size:11px; color:var(--text2); margin-top:2px; }
  .dial-muted { font-family:var(--mono); font-size:12px; color:var(--text3); }

  .formula-bar { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:9px 13px; display:flex; align-items:center; justify-content:space-between; }
  .formula-text { font-family:var(--mono); font-size:11px; color:var(--text3); letter-spacing:0.03em; }
  .formula-accent { color:var(--accent); }

  .settings { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .settings-toggle { width:100%; display:flex; align-items:center; justify-content:space-between; padding:11px 13px; background:transparent; border:none; cursor:pointer; font-family:var(--mono); font-size:11px; color:var(--text2); letter-spacing:0.1em; text-transform:uppercase; min-height:42px; }
  .chevron { transition:transform 0.2s; color:var(--text3); }
  .chevron.open { transform:rotate(180deg); }
  .settings-body { max-height:0; overflow:hidden; transition:max-height 0.25s ease; }
  .settings-body.open { max-height:200px; }
  .setting-row { display:flex; align-items:center; justify-content:space-between; padding:4px 13px 11px; gap:12px; }
  .setting-row label { font-size:13px; color:var(--text2); }
  .click-input-wrap { position:relative; width:118px; }
  .click-input-wrap input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius); color:var(--text); font-family:var(--mono); font-size:17px; padding:9px 36px 9px 12px; outline:none; -webkit-appearance:none; }
  .click-input-wrap input:focus { border-color:var(--accent); }
  .click-unit { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-family:var(--mono); font-size:11px; color:var(--text3); pointer-events:none; }
  .preset-row { display:flex; gap:8px; padding:0 13px 13px; }
  .preset-btn { flex:1; padding:8px; border-radius:8px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); font-family:var(--mono); font-size:13px; cursor:pointer; min-height:40px; }
  .preset-btn:active { background:rgba(200,168,75,0.12); color:var(--accent); }
  .ref-row { padding:0 13px 13px; }
  .ref-btn { width:100%; padding:11px; border-radius:8px; background:var(--bg3); border:1px solid var(--border2); color:var(--accent); font-family:var(--mono); font-size:13px; letter-spacing:0.06em; cursor:pointer; min-height:44px; }
  .ref-btn:active { background:rgba(200,168,75,0.12); }

  .modal { display:none; position:fixed; inset:0; z-index:200; background:#0a0c0f; flex-direction:column; }
  .modal.open { display:flex; }
  .modal-bar { display:flex; align-items:center; justify-content:space-between; padding:calc(0.7rem + var(--safe-top)) 1rem 0.7rem; background:var(--bg2); border-bottom:1px solid var(--border); }
  .modal-title { font-family:var(--display); font-size:14px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--accent); white-space:nowrap; }
  .modal-tools { display:flex; gap:8px; }
  .zoom-btn { width:40px; height:40px; border-radius:8px; background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-family:var(--mono); font-size:20px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .zoom-btn.close { color:var(--text2); font-size:16px; }
  .zoom-btn:active { background:rgba(200,168,75,0.12); }
  .modal-scroll { flex:1; overflow:auto; background:#ffffff; touch-action:auto; -webkit-overflow-scrolling:touch; display:flex; align-items:center; }
  .modal-scroll img { display:block; width:100%; transform-origin:top left; user-select:none; -webkit-user-drag:none; }
  .modal-hint { padding:8px calc(0.6rem + var(--safe-bottom)); padding-bottom:calc(8px + var(--safe-bottom)); text-align:center; font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:0.08em; background:var(--bg2); border-top:1px solid var(--border); }

  #install-banner { display:none; position:fixed; bottom:calc(1rem + var(--safe-bottom)); left:1rem; right:1rem; z-index:100; background:var(--bg2); border:1px solid rgba(200,168,75,0.35); border-radius:var(--radius-lg); padding:1rem 1.25rem; }
  #install-banner.visible { display:block; }
  .banner-row { display:flex; align-items:center; gap:12px; }
  .banner-icon { width:44px; height:44px; border-radius:10px; flex-shrink:0; }
  .banner-title { font-size:14px; font-weight:600; color:var(--text); }
  .banner-sub { font-size:12px; color:var(--text2); font-family:var(--mono); margin-top:2px; }
  .banner-btns { display:flex; gap:8px; margin-top:10px; }
  .btn-install { flex:1; padding:10px; border-radius:var(--radius); background:var(--accent); color:#0a0c0f; font-family:var(--display); font-size:14px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; border:none; cursor:pointer; min-height:44px; }
  .btn-dismiss { padding:10px 16px; border-radius:var(--radius); background:transparent; color:var(--text2); font-family:var(--display); font-size:14px; font-weight:600; border:1px solid var(--border2); cursor:pointer; min-height:44px; }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="11" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.4"/>
      <circle cx="16" cy="16" r="5.5" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.75"/>
      <circle cx="16" cy="16" r="1.8" fill="#c8a84b"/>
      <line x1="16" y1="2" x2="16" y2="8" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.6"/>
      <line x1="16" y1="24" x2="16" y2="30" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.6"/>
      <line x1="2" y1="16" x2="8" y2="16" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.6"/>
      <line x1="24" y1="16" x2="30" y2="16" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.6"/>
    </svg>
    <span class="title">Mil Correct</span>
  </div>
  <div class="range-pill">
    <input type="number" id="range" inputmode="numeric" placeholder="600" min="1" step="1" autocomplete="off">
    <span class="u">m</span>
  </div>
</header>

<main class="main">

  <div class="scope-wrap">
    <svg class="scope" id="scope" viewBox="0 0 132 132" role="img" aria-label="Reticle showing impact point relative to target centre">
      <circle cx="66" cy="66" r="56" stroke="rgba(200,168,75,0.28)" stroke-width="1" fill="none"/>
      <circle cx="66" cy="66" r="38" stroke="rgba(200,168,75,0.4)" stroke-width="1" fill="none"/>
      <circle cx="66" cy="66" r="19" stroke="rgba(200,168,75,0.4)" stroke-width="1" fill="none"/>
      <line x1="66" y1="4" x2="66" y2="50" stroke="rgba(200,168,75,0.45)" stroke-width="1"/>
      <line x1="66" y1="82" x2="66" y2="128" stroke="rgba(200,168,75,0.45)" stroke-width="1"/>
      <line x1="4" y1="66" x2="50" y2="66" stroke="rgba(200,168,75,0.45)" stroke-width="1"/>
      <line x1="82" y1="66" x2="128" y2="66" stroke="rgba(200,168,75,0.45)" stroke-width="1"/>
      <text x="88" y="63" fill="rgba(232,228,220,0.4)" font-family="Share Tech Mono, monospace" font-size="7">3</text>
      <text x="107" y="63" fill="rgba(232,228,220,0.4)" font-family="Share Tech Mono, monospace" font-size="7">6</text>
      <circle cx="66" cy="66" r="2" fill="#c8a84b"/>
      <circle id="impact-dot" cx="66" cy="66" r="4.5" fill="#e24b4a" opacity="0"/>
      <circle id="impact-ring" cx="66" cy="66" r="8" fill="none" stroke="#e24b4a" stroke-width="1" opacity="0"/>
    </svg>
    <div class="impact-lbl" id="impact-lbl">— enter range and miss —</div>
  </div>

  <div class="axis">
    <div class="axis-head">
      <span class="axis-name">WINDAGE</span>
      <span class="axis-val vw"><span id="disp-h">0.00</span><span class="u">m</span></span>
      <span class="seg">
        <button class="onw" id="btn-left" onclick="setHDir('Left')">◀ L</button>
        <button id="btn-right" onclick="setHDir('Right')">R ▶</button>
      </span>
    </div>
    <div class="scale-screen" id="scr-h"><canvas id="cv-h"></canvas></div>
  </div>

  <div class="axis">
    <div class="axis-head">
      <span class="axis-name">ELEVATION</span>
      <span class="axis-val ve"><span id="disp-v">0.00</span><span class="u">m</span></span>
      <span class="seg">
        <button class="one" id="btn-high" onclick="setVDir('High')">▲ H</button>
        <button id="btn-low" onclick="setVDir('Low')">L ▼</button>
      </span>
    </div>
    <div class="scale-screen" id="scr-v"><canvas id="cv-v"></canvas></div>
  </div>

  <div class="dial-grid">
    <div class="dial-card" id="card-h"><div class="dial-muted">— windage —</div></div>
    <div class="dial-card e" id="card-v"><div class="dial-muted">— elevation —</div></div>
  </div>

  <div class="formula-bar">
    <span class="formula-text"><span class="formula-accent">C</span> = ( miss ÷ range ) × 1000</span>
    <span class="formula-text" id="cv-display">0.10 mil/click</span>
  </div>

  <div class="settings">
    <button class="settings-toggle" id="settings-toggle" onclick="toggleSettings()" aria-expanded="false">
      <span>⚙ Scope Settings</span><span class="chevron" id="chevron">▾</span>
    </button>
    <div class="settings-body" id="settings-body">
      <div class="setting-row">
        <label for="click-val">Click value</label>
        <div class="click-input-wrap">
          <input type="number" id="click-val" inputmode="decimal" value="0.10" min="0.01" step="0.01" autocomplete="off">
          <span class="click-unit">mil</span>
        </div>
      </div>
      <div class="preset-row">
        <button class="preset-btn" onclick="setClick(0.1)">0.10</button>
        <button class="preset-btn" onclick="setClick(0.05)">0.05</button>
        <button class="preset-btn" onclick="setClick(0.025)">0.025</button>
      </div>
      <div class="ref-row">
        <button class="ref-btn" onclick="openReticle()">⊹ MSR2 Reticle Reference</button>
      </div>
    </div>
  </div>

</main>

<div id="reticle-modal" class="modal">
  <div class="modal-bar">
    <span class="modal-title">MSR2 Reticle Reference</span>
    <div class="modal-tools">
      <button class="zoom-btn" id="zoom-out" aria-label="Zoom out">−</button>
      <button class="zoom-btn" id="zoom-in" aria-label="Zoom in">+</button>
      <button class="zoom-btn close" onclick="closeReticle()" aria-label="Close">✕</button>
    </div>
  </div>
  <div class="modal-scroll" id="modal-scroll">
    <img src="msr2-reticle.png" id="reticle-img" alt="MSR2 reticle subtension reference chart" draggable="false">
  </div>
  <div class="modal-hint">Pinch or use +/− to zoom · drag to pan</div>
</div>

<div id="install-banner">
  <div class="banner-row">
    <img src="icon-192.png" class="banner-icon" alt="App icon">
    <div><div class="banner-title">Add to Home Screen</div><div class="banner-sub">Install for offline use</div></div>
  </div>
  <div class="banner-btns">
    <button class="btn-install" id="btn-install">Install App</button>
    <button class="btn-dismiss" id="btn-dismiss">Later</button>
  </div>
</div>

<script>
  let hDir = 'Left';
  let vDir = 'High';
  let clickValue = 0.1;
  const PX_PER_MIL = 56 / 6;   // reticle rim (r=56) = 6 mil
  const RIM_MIL = 6;

  const rulers = {};

  function setHDir(dir) {
    hDir = dir;
    document.getElementById('btn-left').className  = (dir === 'Left'  ? 'onw' : '');
    document.getElementById('btn-right').className = (dir === 'Right' ? 'onw' : '');
    calculate();
  }
  function setVDir(dir) {
    vDir = dir;
    document.getElementById('btn-high').className = (dir === 'High' ? 'one' : '');
    document.getElementById('btn-low').className  = (dir === 'Low'  ? 'one' : '');
    calculate();
  }
  function opp(d) { return {Left:'Right',Right:'Left',High:'Low',Low:'High'}[d]; }

  function toggleSettings() {
    const body = document.getElementById('settings-body');
    const chev = document.getElementById('chevron');
    const tog  = document.getElementById('settings-toggle');
    const open = body.classList.toggle('open');
    chev.classList.toggle('open', open);
    tog.setAttribute('aria-expanded', open ? 'true' : 'false');
  }
  function applyClickValue(v) {
    if (!v || v <= 0 || isNaN(v)) return;
    clickValue = v;
    document.getElementById('cv-display').textContent =
      v.toFixed(3).replace(/0+$/,'').replace(/\.$/,'') + ' mil/click';
    calculate();
  }
  function setClick(v) { document.getElementById('click-val').value = v; applyClickValue(v); }

  function updateReticle(milH, milV, hasData) {
    const dot  = document.getElementById('impact-dot');
    const ring = document.getElementById('impact-ring');
    const lbl  = document.getElementById('impact-lbl');
    if (!hasData) {
      dot.setAttribute('opacity','0'); ring.setAttribute('opacity','0');
      lbl.innerHTML = '— enter range and miss —';
      return;
    }
    const sx = (hDir === 'Right') ? 1 : -1;
    const sy = (vDir === 'Low')   ? 1 : -1;
    let dx = sx * milH * PX_PER_MIL;
    let dy = sy * milV * PX_PER_MIL;
    const dist = Math.hypot(dx, dy);
    const rim = RIM_MIL * PX_PER_MIL;
    let off = false;
    if (dist > rim && dist > 0) { const k = rim / dist; dx *= k; dy *= k; off = true; }
    dot.setAttribute('cx', 66 + dx);  dot.setAttribute('cy', 66 + dy);
    ring.setAttribute('cx', 66 + dx); ring.setAttribute('cy', 66 + dy);
    dot.setAttribute('opacity', (milH === 0 && milV === 0) ? '0' : '1');
    ring.setAttribute('opacity', (milH === 0 && milV === 0) ? '0' : '0.5');
    const hTxt = milH > 0 ? `${rulers.h.value.toFixed(2)} m ${hDir === 'Left' ? 'L' : 'R'}` : '';
    const vTxt = milV > 0 ? `${rulers.v.value.toFixed(2)} m ${vDir === 'High' ? 'HIGH' : 'LOW'}` : '';
    const parts = [hTxt, vTxt].filter(Boolean).join('  ·  ');
    lbl.innerHTML = parts ? ('IMPACT · ' + parts + (off ? ' <span class="off">(off-scale)</span>' : '')) : 'ON ZERO';
  }

  function dialCard(el, mil, corr, accentClass, hasData) {
    if (!hasData || mil <= 0) {
      el.innerHTML = '<div class="dial-muted">— ' + (accentClass === 'vw' ? 'windage' : 'elevation') + ' —</div>';
      return;
    }
    const clicks = Math.floor(mil / clickValue + 1e-9);
    const hold   = mil - clicks * clickValue;
    el.innerHTML =
      `<div class="dial-big ${accentClass}">${corr.toUpperCase()} ${mil.toFixed(2)} mil</div>` +
      `<div class="dial-line">${clicks} clicks ${corr.toLowerCase()}</div>` +
      `<div class="dial-line2">hold ${hold.toFixed(2)} mil</div>`;
  }

  function calculate() {
    const range = parseFloat(document.getElementById('range').value);
    const missH = rulers.h ? rulers.h.value : 0;
    const missV = rulers.v ? rulers.v.value : 0;
    const hasRange = range && range > 0;

    const milH = (hasRange && missH > 0) ? (missH / range) * 1000 : 0;
    const milV = (hasRange && missV > 0) ? (missV / range) * 1000 : 0;

    updateReticle(milH, milV, hasRange);
    dialCard(document.getElementById('card-h'), milH, opp(hDir), 'vw', hasRange);
    dialCard(document.getElementById('card-v'), milV, opp(vDir), 've', hasRange);
  }

  document.getElementById('range').addEventListener('input', calculate);
  document.getElementById('click-val').addEventListener('input', function () { applyClickValue(parseFloat(this.value)); });

  // ── Instrument-scale drag ruler engine ──
  function makeRuler(opts) {
    const screen = document.getElementById(opts.screenId);
    const cv = document.getElementById(opts.canvasId);
    const disp = document.getElementById(opts.dispId);
    const ctx = cv.getContext('2d');
    const accent = opts.accent;
    const SPACING = opts.spacing;
    const STEP = 0.01, FRICTION = 0.94, STOP = 0.000004;
    let value = 0, vel = 0, raf = null, lastT = 0, H = 52, W = 0;
    let dragging = false, samples = [], startX = 0, startVal = 0;

    const api = { get value() { return value; } };

    function resize() {
      W = screen.clientWidth;
      const dpr = window.devicePixelRatio || 1;
      cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const cx = W / 2, top = 10;
      ctx.strokeStyle = 'rgba(232,228,220,0.28)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, top); ctx.lineTo(W, top); ctx.stroke();
      const half = Math.ceil((W / 2) / SPACING) + 2;
      const base = Math.round(value / STEP);
      for (let i = -half; i <= half; i++) {
        const idx = base + i, t = idx * STEP;
        if (t < -1e-9) continue;
        const x = cx + (t - value) / STEP * SPACING;
        if (x < -2 || x > W + 2) continue;
        const major = idx % 10 === 0, mid = idx % 5 === 0;
        const h = major ? 20 : (mid ? 12 : 6);
        ctx.strokeStyle = major ? 'rgba(232,228,220,0.72)' : (mid ? 'rgba(232,228,220,0.48)' : 'rgba(232,228,220,0.26)');
        ctx.lineWidth = major ? 1.4 : 1;
        ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, top + h); ctx.stroke();
        if (major) {
          ctx.fillStyle = 'rgba(232,228,220,0.68)';
          ctx.font = '10px "Share Tech Mono", monospace';
          ctx.textAlign = 'center';
          ctx.fillText(t.toFixed(2), x, top + h + 12);
        }
      }
      ctx.fillStyle = accent;
      ctx.beginPath(); ctx.moveTo(cx - 5, 0); ctx.lineTo(cx + 5, 0); ctx.lineTo(cx, 7); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = accent; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H - 2); ctx.stroke();
    }
    function setVal(v) { value = Math.max(0, v); disp.textContent = value.toFixed(2); }
    function haptic() { try { if (navigator.vibrate) navigator.vibrate(12); } catch (e) {} }

    function onDown(e) {
      cancelAnimationFrame(raf); raf = null; vel = 0; dragging = true;
      screen.setPointerCapture(e.pointerId);
      startX = e.clientX; startVal = value;
      samples = [{ p: startX, t: performance.now() }];
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      const d = e.clientX - startX;
      setVal(startVal - (d / SPACING) * STEP);
      samples.push({ p: e.clientX, t: performance.now() });
      if (samples.length > 6) samples.shift();
      draw(); calculate(); e.preventDefault();
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      const now = performance.now();
      const recent = samples.filter(s => now - s.t < 90);
      let vPx = 0;
      if (recent.length >= 2) {
        const a = recent[0], b = recent[recent.length - 1];
        const dt = b.t - a.t; if (dt > 0) vPx = (b.p - a.p) / dt;
      }
      vel = -(vPx / SPACING) * STEP; lastT = performance.now();
      if (Math.abs(vel) > STOP) raf = requestAnimationFrame(inertia); else snap();
    }
    function inertia() {
      const now = performance.now();
      const dt = Math.min(40, now - lastT); lastT = now;
      setVal(value + vel * dt);
      vel *= Math.pow(FRICTION, dt / 16.67);
      if (value <= 0 && vel < 0) vel = 0;
      draw(); calculate();
      if (Math.abs(vel) > STOP) raf = requestAnimationFrame(inertia); else snap();
    }
    function snap() {
      const start = value, target = Math.max(0, Math.round(value / STEP) * STEP);
      if (Math.abs(target - start) < 1e-4) { setVal(target); draw(); calculate(); haptic(); return; }
      const dur = 200, t0 = performance.now();
      (function step() {
        const k = Math.min(1, (performance.now() - t0) / dur);
        const e = 1 - Math.pow(1 - k, 3);
        setVal(start + (target - start) * e); draw();
        if (k < 1) requestAnimationFrame(step);
        else { setVal(target); draw(); calculate(); haptic(); }
      })();
    }
    function onWheel(e) {
      cancelAnimationFrame(raf); raf = null; vel = 0;
      setVal(value + (e.deltaY > 0 ? -STEP : STEP));
      draw(); calculate();
      clearTimeout(screen._wt); screen._wt = setTimeout(snap, 140);
      e.preventDefault();
    }

    screen.addEventListener('pointerdown', onDown);
    screen.addEventListener('pointermove', onMove);
    screen.addEventListener('pointerup', onUp);
    screen.addEventListener('pointercancel', onUp);
    screen.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('resize', resize);
    resize();
    return api;
  }

  rulers.h = makeRuler({ screenId:'scr-h', canvasId:'cv-h', dispId:'disp-h', accent:'#c8a84b', spacing:15 });
  rulers.v = makeRuler({ screenId:'scr-v', canvasId:'cv-v', dispId:'disp-v', accent:'#8fbf6a', spacing:15 });
  calculate();

  // ── MSR2 reticle reference modal ──
  (function () {
    const modal  = document.getElementById('reticle-modal');
    const scroll = document.getElementById('modal-scroll');
    const img    = document.getElementById('reticle-img');
    let zoom = 1;
    const MIN = 1, MAX = 5;

    function applyZoom(z, focusX, focusY) {
      const prev = zoom;
      zoom = Math.max(MIN, Math.min(MAX, z));
      const baseW = scroll.clientWidth;
      img.style.width = (baseW * zoom) + 'px';
      if (focusX != null && prev > 0) {
        const ratio = zoom / prev;
        scroll.scrollLeft = (scroll.scrollLeft + focusX) * ratio - focusX;
        scroll.scrollTop  = (scroll.scrollTop  + focusY) * ratio - focusY;
      }
    }

    window.openReticle = function () {
      modal.classList.add('open');
      zoom = 1;
      requestAnimationFrame(() => { img.style.width = scroll.clientWidth + 'px'; });
    };
    window.closeReticle = function () { modal.classList.remove('open'); };

    document.getElementById('zoom-in').addEventListener('click', () =>
      applyZoom(zoom + 0.5, scroll.clientWidth / 2, scroll.clientHeight / 2));
    document.getElementById('zoom-out').addEventListener('click', () =>
      applyZoom(zoom - 0.5, scroll.clientWidth / 2, scroll.clientHeight / 2));

    // pinch zoom
    let pinch = null;
    scroll.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinch = { d: Math.hypot(dx, dy), z: zoom };
      }
    }, { passive: true });
    scroll.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && pinch) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d = Math.hypot(dx, dy);
        const r = scroll.getBoundingClientRect();
        const fx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
        const fy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
        applyZoom(pinch.z * (d / pinch.d), fx, fy);
        e.preventDefault();
      }
    }, { passive: false });
    scroll.addEventListener('touchend', e => { if (e.touches.length < 2) pinch = null; });

    // double-tap to toggle zoom
    let lastTap = 0;
    scroll.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300 && e.changedTouches.length === 1) {
        const r = scroll.getBoundingClientRect();
        const fx = e.changedTouches[0].clientX - r.left;
        const fy = e.changedTouches[0].clientY - r.top;
        applyZoom(zoom > 1.2 ? 1 : 2.5, fx, fy);
      }
      lastTap = now;
    });
  })();

  // ── PWA install prompt ──
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (!localStorage.getItem('pwa-dismissed')) setTimeout(() => banner.classList.add('visible'), 1500);
  });
  document.getElementById('btn-install').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('visible');
  });
  document.getElementById('btn-dismiss').addEventListener('click', () => {
    document.getElementById('install-banner').classList.remove('visible');
    localStorage.setItem('pwa-dismissed', '1');
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
</body>
</html>
