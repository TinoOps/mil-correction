<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0c0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MilCorr">
<meta name="description" content="Precision scope adjustment calculator">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<title>Mil Correction</title>
<style>
  :root {
    --bg:        #0a0c0f;
    --bg2:       #111417;
    --bg3:       #181c21;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.13);
    --accent:    #c8a84b;
    --accent2:   #8fbf6a;
    --text:      #e8e4dc;
    --text2:     #8a8880;
    --text3:     #4a4a48;
    --mono:      'Share Tech Mono', monospace;
    --display:   'Rajdhani', sans-serif;
    --radius:    10px;
    --radius-lg: 16px;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  body { padding-bottom: calc(1.5rem + var(--safe-bottom)); }

  /* ── Header ── */
  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: calc(0.875rem + var(--safe-top)) 1.25rem 0.875rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .app-header-inner { display: flex; align-items: center; gap: 10px; }

  .app-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }

  .app-subtitle {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
    font-family: var(--mono);
  }

  /* ── Main ── */
  .main { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #a8a59a;
    font-family: var(--mono);
    margin-bottom: 8px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.125rem 1.25rem;
  }

  /* ── Range ── */
  .range-input-wrap { position: relative; }

  .range-input-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 24px;
    padding: 13px 56px 13px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .range-input-wrap input:focus { border-color: var(--accent); }
  .range-input-wrap input::placeholder { color: var(--text3); font-size: 18px; }

  .range-unit {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 12px; color: var(--text2);
    letter-spacing: 0.1em; pointer-events: none;
  }

  /* ── Miss grid ── */
  .miss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .miss-block { display: flex; flex-direction: column; gap: 7px; }

  .miss-header { display: flex; align-items: center; gap: 6px; }

  .miss-type-label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    font-family: var(--mono); color: var(--text2);
  }

  .type-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-wind { background: var(--accent); }
  .dot-elev { background: var(--accent2); }

  .seg-ctrl {
    display: flex; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }

  .seg-btn {
    flex: 1; padding: 9px 4px;
    font-family: var(--display); font-size: 12px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    border: none; background: transparent; color: var(--text2);
    cursor: pointer; transition: background 0.15s, color 0.15s;
    min-height: 44px;
  }

  .seg-btn.active-wind { background: rgba(200,168,75,0.15); color: var(--accent); }
  .seg-btn.active-elev { background: rgba(143,191,106,0.15); color: var(--accent2); }

  .miss-input-wrap { position: relative; }

  .miss-input-wrap input {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--border2); border-radius: var(--radius);
    color: var(--text); font-family: var(--mono); font-size: 20px;
    padding: 12px 38px 12px 14px; outline: none;
    transition: border-color 0.2s; -webkit-appearance: none;
  }

  .miss-input-wrap input::placeholder { color: var(--text3); font-size: 15px; }
  #miss-h:focus { border-color: var(--accent); }
  #miss-v:focus { border-color: var(--accent2); }

  .miss-unit {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 10px; color: var(--text3);
    pointer-events: none; letter-spacing: 0.08em;
  }

  /* ── Drag ruler picker ── */
  .axis-block { display: flex; flex-direction: column; gap: 10px; }
  .axis-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .axis-divider { height: 1px; background: var(--border); margin: 1.125rem 0; }

  .seg-compact { width: 132px; flex-shrink: 0; }
  .seg-compact .seg-btn { padding: 7px 4px; font-size: 12px; min-height: 38px; }

  .picker-readout { display: flex; align-items: baseline; justify-content: center; gap: 4px; }
  .picker-val {
    width: 140px; text-align: center; background: transparent; border: none;
    outline: none; font-family: var(--mono); font-size: 36px; font-weight: 700;
    padding: 0; -webkit-appearance: none; line-height: 1;
  }
  .picker-val.val-wind { color: var(--accent); }
  .picker-val.val-elev { color: var(--accent2); }
  .picker-unit { font-size: 14px; color: var(--text2); font-family: var(--mono); }

  .ruler-screen {
    position: relative; background: var(--bg3);
    border: 1px solid var(--border2); border-radius: var(--radius);
    overflow: hidden; touch-action: none; height: 78px; cursor: grab;
  }
  .ruler-screen:active { cursor: grabbing; }
  .ruler-screen canvas { display: block; width: 100%; height: 78px; }

  .ruler-center {
    position: absolute; top: 12%; bottom: 12%; left: 50%; width: 2px;
    transform: translateX(-50%); border-radius: 2px; pointer-events: none;
  }
  .center-wind { background: var(--accent); box-shadow: 0 0 8px rgba(200,168,75,0.55); }
  .center-elev { background: var(--accent2); box-shadow: 0 0 8px rgba(143,191,106,0.55); }

  .divider { height: 1px; background: var(--border); margin: 1rem 0; }

  /* ── Results ── */
  .results-wrap { display: flex; flex-direction: column; gap: 10px; }

  .result-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .result-tile {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.125rem;
    position: relative; overflow: hidden;
  }

  .result-tile::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .result-tile.wind::before { background: var(--accent); }
  .result-tile.elev::before { background: var(--accent2); }

  .tile-label {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: var(--mono); color: var(--text2); margin-bottom: 8px;
  }

  .tile-value { font-size: 34px; font-weight: 700; line-height: 1; letter-spacing: 0.02em; }
  .tile-value.wind { color: var(--accent); }
  .tile-value.elev { color: var(--accent2); }
  .tile-unit { font-size: 13px; font-weight: 400; color: var(--text2); margin-left: 2px; }

  .tile-clicks { font-size: 12px; font-family: var(--mono); color: var(--text2); margin-top: 5px; }

  .tile-dir {
    display: inline-block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 10px; border-radius: 99px; margin-top: 7px;
  }

  .tile-dir.wind { background: rgba(200,168,75,0.12); color: var(--accent); }
  .tile-dir.elev { background: rgba(143,191,106,0.12); color: var(--accent2); }

  /* ── Combined ── */
  .combined-card {
    background: var(--bg2); border: 1px solid rgba(200,168,75,0.22);
    border-radius: var(--radius-lg); padding: 1.125rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  .combined-label {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: var(--mono); color: var(--text2); margin-bottom: 6px;
  }

  .combined-value { font-size: 42px; font-weight: 700; color: var(--text); line-height: 1; }
  .combined-value span { font-size: 16px; color: var(--text2); font-weight: 400; margin-left: 3px; }

  .combined-right { text-align: right; flex-shrink: 0; }

  .dial-title {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    font-family: var(--mono); color: var(--text3); margin-bottom: 6px;
  }

  .dial-line { font-size: 15px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 4px; font-family: var(--mono); }
  .dial-line.wind { color: var(--accent); }
  .dial-line.elev { color: var(--accent2); }

  /* ── Formula bar ── */
  .formula-bar {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .formula-text { font-family: var(--mono); font-size: 12px; color: var(--text3); letter-spacing: 0.04em; }
  .formula-accent { color: var(--accent); }

  /* ── Install banner ── */
  #install-banner {
    display: none; position: fixed; bottom: calc(1rem + var(--safe-bottom));
    left: 1rem; right: 1rem; z-index: 100;
    background: var(--bg2); border: 1px solid rgba(200,168,75,0.35);
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .banner-row { display: flex; align-items: center; gap: 12px; }
  .banner-icon { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
  .banner-text { flex: 1; }
  .banner-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.05em; }
  .banner-sub { font-size: 12px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }

  .banner-btns { display: flex; gap: 8px; margin-top: 10px; }

  .btn-install {
    flex: 1; padding: 10px; border-radius: var(--radius);
    background: var(--accent); color: #0a0c0f;
    font-family: var(--display); font-size: 14px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; border: none; cursor: pointer;
    min-height: 44px;
  }

  .btn-dismiss {
    padding: 10px 16px; border-radius: var(--radius);
    background: transparent; color: var(--text2);
    font-family: var(--display); font-size: 14px; font-weight: 600;
    border: 1px solid var(--border2); cursor: pointer; min-height: 44px;
  }

  /* ── Empty state ── */
  .empty-state {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 2.5rem 1.25rem; text-align: center;
  }

  .empty-text { font-size: 13px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.06em; margin-top: 1rem; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeUp 0.22s ease both; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #install-banner.visible { display: block; animation: slideUp 0.3s ease both; }

  /* ── Input tweaks ── */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="17" cy="17" r="11" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.4"/>
      <circle cx="17" cy="17" r="5.5" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.75"/>
      <circle cx="17" cy="17" r="1.8" fill="#c8a84b"/>
      <line x1="17" y1="2" x2="17" y2="8.5" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.65"/>
      <line x1="17" y1="25.5" x2="17" y2="32" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.65"/>
      <line x1="2" y1="17" x2="8.5" y2="17" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.65"/>
      <line x1="25.5" y1="17" x2="32" y2="17" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.65"/>
      <line x1="11.5" y1="17" x2="13.8" y2="17" stroke="#c8a84b" stroke-width="1.3"/>
      <line x1="20.2" y1="17" x2="22.5" y2="17" stroke="#c8a84b" stroke-width="1.3"/>
      <line x1="17" y1="11.5" x2="17" y2="13.8" stroke="#c8a84b" stroke-width="1.3"/>
      <line x1="17" y1="20.2" x2="17" y2="22.5" stroke="#c8a84b" stroke-width="1.3"/>
    </svg>
    <div>
      <div class="app-title">Mil Correct</div>
      <div class="app-subtitle">Scope Adjustment Calculator</div>
    </div>
  </div>
</header>

<main class="main">

  <div>
    <div class="section-label">Range to Target</div>
    <div class="card">
      <div class="range-input-wrap">
        <input type="number" id="range" inputmode="numeric" placeholder="600" min="1" step="1" autocomplete="off">
        <span class="range-unit">METRES</span>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Miss Distance</div>
    <div class="card">
      <div class="axis-block">
        <div class="axis-head">
          <div class="miss-header">
            <div class="type-dot dot-wind"></div>
            <span class="miss-type-label">Windage</span>
          </div>
          <div class="seg-ctrl seg-compact">
            <button class="seg-btn active-wind" id="btn-left"  onclick="setHDir('Left')">◀ L</button>
            <button class="seg-btn"             id="btn-right" onclick="setHDir('Right')">R ▶</button>
          </div>
        </div>
        <div class="picker-readout">
          <input type="number" id="miss-h" class="picker-val val-wind" inputmode="decimal" value="0.00" min="0" step="0.01" autocomplete="off">
          <span class="picker-unit">m</span>
        </div>
        <div class="ruler-screen" id="scr-h">
          <canvas id="cv-h"></canvas>
          <div class="ruler-center center-wind"></div>
        </div>
      </div>

      <div class="axis-divider"></div>

      <div class="axis-block">
        <div class="axis-head">
          <div class="miss-header">
            <div class="type-dot dot-elev"></div>
            <span class="miss-type-label">Elevation</span>
          </div>
          <div class="seg-ctrl seg-compact">
            <button class="seg-btn active-elev" id="btn-high" onclick="setVDir('High')">▲ H</button>
            <button class="seg-btn"             id="btn-low"  onclick="setVDir('Low')">L ▼</button>
          </div>
        </div>
        <div class="picker-readout">
          <input type="number" id="miss-v" class="picker-val val-elev" inputmode="decimal" value="0.00" min="0" step="0.01" autocomplete="off">
          <span class="picker-unit">m</span>
        </div>
        <div class="ruler-screen" id="scr-v">
          <canvas id="cv-v"></canvas>
          <div class="ruler-center center-elev"></div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Correction</div>
    <div id="result-area"></div>
  </div>

  <div class="formula-bar">
    <span class="formula-text"><span class="formula-accent">C</span> = ( miss ÷ range ) × 1000</span>
    <span class="formula-text">0.1 mil/click</span>
  </div>

</main>

<!-- Install banner -->
<div id="install-banner">
  <div class="banner-row">
    <img src="icon-192.png" class="banner-icon" alt="App icon">
    <div class="banner-text">
      <div class="banner-title">Add to Home Screen</div>
      <div class="banner-sub">Install for offline use</div>
    </div>
  </div>
  <div class="banner-btns">
    <button class="btn-install" id="btn-install">Install App</button>
    <button class="btn-dismiss" id="btn-dismiss">Later</button>
  </div>
</div>

<script>
  // ── State ──
  let hDir = 'Left';
  let vDir = 'High';

  function setHDir(dir) {
    hDir = dir;
    document.getElementById('btn-left').className  = 'seg-btn' + (dir === 'Left'  ? ' active-wind' : '');
    document.getElementById('btn-right').className = 'seg-btn' + (dir === 'Right' ? ' active-wind' : '');
    calculate();
  }

  function setVDir(dir) {
    vDir = dir;
    document.getElementById('btn-high').className = 'seg-btn' + (dir === 'High' ? ' active-elev' : '');
    document.getElementById('btn-low').className  = 'seg-btn' + (dir === 'Low'  ? ' active-elev' : '');
    calculate();
  }

  function opp(d) { return {Left:'Right', Right:'Left', High:'Low', Low:'High'}[d]; }

  function calculate() {
    const range = parseFloat(document.getElementById('range').value);
    const missH = parseFloat(document.getElementById('miss-h').value) || 0;
    const missV = parseFloat(document.getElementById('miss-v').value) || 0;
    const area  = document.getElementById('result-area');

    if (!range || range <= 0 || (missH === 0 && missV === 0)) {
      area.innerHTML = `
        <div class="empty-state animate-in">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" opacity="0.18">
            <circle cx="36" cy="36" r="30" stroke="#e8e4dc" stroke-width="1.2"/>
            <circle cx="36" cy="36" r="16" stroke="#e8e4dc" stroke-width="1.2"/>
            <circle cx="36" cy="36" r="3.5" fill="#e8e4dc"/>
            <line x1="36" y1="4" x2="36" y2="20" stroke="#e8e4dc" stroke-width="1.2"/>
            <line x1="36" y1="52" x2="36" y2="68" stroke="#e8e4dc" stroke-width="1.2"/>
            <line x1="4" y1="36" x2="20" y2="36" stroke="#e8e4dc" stroke-width="1.2"/>
            <line x1="52" y1="36" x2="68" y2="36" stroke="#e8e4dc" stroke-width="1.2"/>
          </svg>
          <div class="empty-text">Enter range and miss distance</div>
        </div>`;
      return;
    }

    const milH   = missH > 0 ? (missH / range) * 1000 : 0;
    const milV   = missV > 0 ? (missV / range) * 1000 : 0;
    const milTot = Math.sqrt(milH * milH + milV * milV);
    const clkH   = Math.round(milH / 0.1);
    const clkV   = Math.round(milV / 0.1);
    const corrH  = opp(hDir);
    const corrV  = opp(vDir);

    let html = '<div class="results-wrap animate-in">';

    if (missH > 0 || missV > 0) {
      html += '<div class="result-pair">';
      if (missH > 0) {
        html += `
          <div class="result-tile wind">
            <div class="tile-label">Windage</div>
            <div class="tile-value wind">${milH.toFixed(2)}<span class="tile-unit">mil</span></div>
            <div class="tile-clicks">${clkH} clicks</div>
            <div class="tile-dir wind">${corrH}</div>
          </div>`;
      } else {
        html += '<div></div>';
      }
      if (missV > 0) {
        html += `
          <div class="result-tile elev">
            <div class="tile-label">Elevation</div>
            <div class="tile-value elev">${milV.toFixed(2)}<span class="tile-unit">mil</span></div>
            <div class="tile-clicks">${clkV} clicks</div>
            <div class="tile-dir elev">${corrV}</div>
          </div>`;
      }
      html += '</div>';
    }

    if (missH > 0 && missV > 0) {
      html += `
        <div class="combined-card">
          <div>
            <div class="combined-label">Combined offset</div>
            <div class="combined-value">${milTot.toFixed(2)}<span>mil</span></div>
          </div>
          <div class="combined-right">
            <div class="dial-title">Dial in</div>
            <div class="dial-line wind">${corrH} ${milH.toFixed(2)}</div>
            <div class="dial-line elev">${corrV} ${milV.toFixed(2)}</div>
          </div>
        </div>`;
    }

    html += '</div>';
    area.innerHTML = html;
  }

  document.getElementById('range').addEventListener('input', calculate);

  // ── Drag ruler picker engine ──
  function makeRuler(opts) {
    const screen = document.getElementById(opts.screenId);
    const cv = document.getElementById(opts.canvasId);
    const out = document.getElementById(opts.outId);
    const ctx = cv.getContext('2d');
    const SPACING = opts.spacing;   // px per 0.01 m
    const STEP = 0.01, FRICTION = 0.94, STOP = 0.000004;
    const TICK = 'rgba(232,228,220,0.55)', TICKMIN = 'rgba(232,228,220,0.20)', TXT = 'rgba(232,228,220,0.80)';
    let value = 0, vel = 0, raf = null, lastT = 0, H = 78, W = 0;
    let dragging = false, samples = [], startX = 0, startVal = 0;

    function resize() {
      W = screen.clientWidth;
      const dpr = window.devicePixelRatio || 1;
      cv.width = Math.round(W * dpr);
      cv.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const cx = W / 2;
      const half = Math.ceil((W / 2) / SPACING) + 2;
      const base = Math.round(value / STEP);
      for (let i = -half; i <= half; i++) {
        const idx = base + i;
        const t = idx * STEP;
        if (t < -1e-9) continue;
        const x = cx + (t - value) / STEP * SPACING;
        if (x < -20 || x > W + 20) continue;
        const major = (idx % 10 === 0);
        const mid = (idx % 5 === 0);
        const h = major ? 30 : (mid ? 20 : 13);
        ctx.strokeStyle = major ? TICK : TICKMIN;
        ctx.lineWidth = major ? 1.6 : 1;
        ctx.beginPath();
        ctx.moveTo(x, H * 0.18);
        ctx.lineTo(x, H * 0.18 + h);
        ctx.stroke();
        if (major) {
          ctx.fillStyle = TXT;
          ctx.font = '12px "Share Tech Mono", monospace';
          ctx.textAlign = 'center';
          ctx.fillText(t.toFixed(1), x, H * 0.18 + h + 16);
        }
      }
    }

    function setVal(v) { value = Math.max(0, v); out.value = value.toFixed(2); }

    function onDown(e) {
      cancelAnimationFrame(raf); raf = null; vel = 0;
      dragging = true;
      screen.setPointerCapture(e.pointerId);
      startX = e.clientX; startVal = value;
      samples = [{ p: startX, t: performance.now() }];
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      const d = e.clientX - startX;
      setVal(startVal - (d / SPACING) * STEP);
      samples.push({ p: e.clientX, t: performance.now() });
      if (samples.length > 6) samples.shift();
      draw(); calculate();
      e.preventDefault();
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      const now = performance.now();
      const recent = samples.filter(s => now - s.t < 90);
      let vPx = 0;
      if (recent.length >= 2) {
        const a = recent[0], b = recent[recent.length - 1];
        const dt = b.t - a.t;
        if (dt > 0) vPx = (b.p - a.p) / dt;
      }
      vel = -(vPx / SPACING) * STEP;
      lastT = performance.now();
      if (Math.abs(vel) > STOP) raf = requestAnimationFrame(inertia);
      else snap();
    }
    function inertia() {
      const now = performance.now();
      const dt = Math.min(40, now - lastT); lastT = now;
      setVal(value + vel * dt);
      vel *= Math.pow(FRICTION, dt / 16.67);
      if (value <= 0 && vel < 0) vel = 0;
      draw(); calculate();
      if (Math.abs(vel) > STOP) raf = requestAnimationFrame(inertia);
      else snap();
    }
    function snap() {
      const start = value, target = Math.max(0, Math.round(value / STEP) * STEP);
      if (Math.abs(target - start) < 1e-4) { setVal(target); draw(); calculate(); return; }
      const dur = 200, t0 = performance.now();
      (function step() {
        const k = Math.min(1, (performance.now() - t0) / dur);
        const e = 1 - Math.pow(1 - k, 3);
        setVal(start + (target - start) * e);
        draw();
        if (k < 1) requestAnimationFrame(step);
        else { setVal(target); draw(); calculate(); }
      })();
    }
    function onWheel(e) {
      cancelAnimationFrame(raf); raf = null; vel = 0;
      setVal(value + (e.deltaY > 0 ? -STEP : STEP));
      draw(); calculate();
      clearTimeout(screen._wt);
      screen._wt = setTimeout(snap, 140);
      e.preventDefault();
    }

    out.addEventListener('input', () => {
      let v = parseFloat(out.value);
      if (isNaN(v)) return;
      cancelAnimationFrame(raf); raf = null; vel = 0;
      value = Math.max(0, v);
      draw(); calculate();
    });
    out.addEventListener('blur', () => { setVal(value); });

    screen.addEventListener('pointerdown', onDown);
    screen.addEventListener('pointermove', onMove);
    screen.addEventListener('pointerup', onUp);
    screen.addEventListener('pointercancel', onUp);
    screen.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('resize', resize);
    resize();
  }

  makeRuler({ screenId: 'scr-h', canvasId: 'cv-h', outId: 'miss-h', spacing: 15 });
  makeRuler({ screenId: 'scr-v', canvasId: 'cv-v', outId: 'miss-v', spacing: 15 });

  // ── PWA install prompt ──
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (!localStorage.getItem('pwa-dismissed')) {
      setTimeout(() => banner.classList.add('visible'), 1500);
    }
  });

  document.getElementById('btn-install').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('visible');
  });

  document.getElementById('btn-dismiss').addEventListener('click', () => {
    document.getElementById('install-banner').classList.remove('visible');
    localStorage.setItem('pwa-dismissed', '1');
  });

  // ── Service worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
